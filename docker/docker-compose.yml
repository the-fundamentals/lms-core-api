name: LMS Core API Services

services:
  cloud:
    container_name: localstack
    image: localstack/localstack-pro
    ports:
      - "127.0.0.1:4566:4566" # Localstack gateway
      - "127.0.0.1:4510-4559:4510-4559" # External services port range
    environment:
      - DEBUG=0
      - PERSISTENCE=1
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN:?missing localstack auth token}
      # LocalStack gateway CORS allowlist (exact Origin match). Must be ORIGINS (plural).
      # Include Swagger UI (8080) and the management web app (3000).
      - EXTRA_CORS_ALLOWED_ORIGINS=http://localhost:8080,http://localhost:3000
      - EXTRA_CORS_ALLOWED_HEADERS=*
    volumes:
      - "cloud-volume:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
    restart: unless-stopped
    networks:
      main-network:
  database:
    container_name: postgresql
    image: postgres:16.6
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - "database-volume:/var/lib/postgresql/data"
    networks:
      main-network:
networks:
  main-network:
volumes:
  cloud-volume:
  database-volume:
