spring:
  application:
    name: lms-core-api
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      schema-locations: classpath:schema.sql
  security:
    oauth2:
      resourceserver:
        jwt:
          # Spring auto-builds the JwtDecoder from this URL (signature validation).
          # Override COGNITO_JWK_SET_URI in prod, or set COGNITO_HOST_URI + COGNITO_USER_POOL_ID.
          #   local:  http://localhost:4566/<user-pool-id>/.well-known/jwks.json
          #   aws:    https://cognito-idp.<region>.amazonaws.com/<user-pool-id>/.well-known/jwks.json
          jwk-set-uri: ${COGNITO_JWK_SET_URI:${app.cognito.host-uri}/${app.cognito.user-pool-id}/.well-known/jwks.json}

# Cognito identity settings — override via env per environment.
app:
  cognito:
    region: ${COGNITO_REGION:ap-southeast-1}
    user-pool-id: ${COGNITO_USER_POOL_ID:ap-southeast-1_a73086f325b1486aba573c6ad21d63d8}
    app-client-id: ${COGNITO_APP_CLIENT_ID:gzhu8d7n35hhtky432u1yrw1z0}
    host-uri: ${COGNITO_HOST_URI:http://localhost:4566}

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    # Use the curated OpenAPI contract (bearerAuth + /admin + /private paths).
    url: /openapi.yml
    disable-swagger-default-url: true
    try-it-out-enabled: true
    operations-sorter: method
    tags-sorter: alpha
