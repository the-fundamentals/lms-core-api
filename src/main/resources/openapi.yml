openapi: 3.0.3
info:
  title: LMS Core API
  version: 0.0.1
  description: Core API for the Learning Management System. Management endpoints under `/admin/**` require the ADMIN role. Authenticated self-service endpoints live under `/private/**`.

tags:
  - name: AccountProfile
    description: Authenticated account profile (`/private/profile`) for any logged-in user
  - name: Classroom
    description: Admin-only classroom management (`/admin/classrooms`)
  - name: ClassroomMembers
    description: Admin-only classroom member management (`/admin/classrooms/.../members`)
  - name: ClassroomSessions
    description: Admin-only classroom session and attendance management (`/admin/classrooms/.../sessions`)

security:
  - bearerAuth: []

paths:
  /private/profile:
    get:
      tags:
        - AccountProfile
      operationId: getMyAccountProfile
      summary: Get the current user's account profile
      description: >
        Returns the account profile for the authenticated Cognito user (JWT `sub`).
        When no profile row exists yet, responds with `ACCOUNT_PROFILE_NOT_FOUND` so the
        client can start onboarding.
      responses:
        "200":
          description: Account profile found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountProfileResponse"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No account profile for this Cognito user (onboarding required)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/classrooms:
    post:
      tags:
        - Classroom
      operationId: createClassroom
      summary: Create a classroom
      description: Creates a new classroom and returns it.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClassroomCommand"
      responses:
        "201":
          description: Classroom created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassroomResponse"
        "400":
          description: Invalid create command
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/classrooms/query:
    post:
      tags:
        - Classroom
      operationId: getAllClassrooms
      summary: Get All Classrooms
      description: Get all classrooms in the database
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClassroomFilter"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAllClassroomsResponse"


  /admin/classrooms/{id}:
    get:
      tags:
        - Classroom
      operationId: getClassroomById
      summary: Get a classroom by id
      description: Returns a single classroom by its identifier.
      parameters:
        - $ref: "#/components/parameters/ClassroomId"
      responses:
        "200":
          description: Classroom found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassroomResponse"
        "404":
          description: Classroom not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags:
        - Classroom
      operationId: updateClassroom
      summary: Update a classroom
      description: Updates an existing classroom and returns the updated resource.
      parameters:
        - $ref: "#/components/parameters/ClassroomId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClassroomCommand"
      responses:
        "200":
          description: Classroom updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassroomResponse"
        "400":
          description: Invalid update command
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Classroom not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/classrooms/{classroomId}/members:
    post:
      tags:
        - ClassroomMembers
      operationId: createClassroomMember
      summary: Add a member to a classroom
      description: Creates a classroom membership, or reactivates a previously removed member.
      parameters:
        - $ref: "#/components/parameters/ClassroomIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClassroomMemberCommand"
      responses:
        "201":
          description: Classroom member created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassroomMemberResponse"
        "400":
          description: Invalid create command
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Classroom not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Member already active in the classroom
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/classrooms/{classroomId}/members/query:
    post:
      tags:
        - ClassroomMembers
      operationId: getAllClassroomMembers
      summary: Get all classroom members
      description: Query members belonging to a classroom.
      parameters:
        - $ref: "#/components/parameters/ClassroomIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClassroomMemberFilter"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAllClassroomMembersResponse"
        "404":
          description: Classroom not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/classrooms/{classroomId}/members/{memberId}:
    patch:
      tags:
        - ClassroomMembers
      operationId: updateClassroomMemberRole
      summary: Update a classroom member role
      description: Updates only the role of an active classroom member.
      parameters:
        - $ref: "#/components/parameters/ClassroomIdPath"
        - $ref: "#/components/parameters/MemberId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClassroomMemberRoleCommand"
      responses:
        "200":
          description: Classroom member role updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassroomMemberResponse"
        "400":
          description: Invalid update command
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Classroom member not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags:
        - ClassroomMembers
      operationId: removeClassroomMember
      summary: Remove a classroom member
      description: Soft-deletes a classroom member by marking their status as REMOVED.
      parameters:
        - $ref: "#/components/parameters/ClassroomIdPath"
        - $ref: "#/components/parameters/MemberId"
      responses:
        "204":
          description: Classroom member removed
        "404":
          description: Classroom member not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/classrooms/{classroomId}/sessions:
    post:
      tags:
        - ClassroomSessions
      operationId: createClassroomSession
      summary: Create a classroom session
      description: Creates a new session for a classroom.
      parameters:
        - $ref: "#/components/parameters/ClassroomIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClassroomSessionCommand"
      responses:
        "201":
          description: Classroom session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassroomSessionResponse"
        "400":
          description: Invalid create command
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Classroom not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/classrooms/{classroomId}/sessions/query:
    post:
      tags:
        - ClassroomSessions
      operationId: getAllClassroomSessions
      summary: Get all classroom sessions
      description: Query sessions belonging to a classroom.
      parameters:
        - $ref: "#/components/parameters/ClassroomIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClassroomSessionFilter"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAllClassroomSessionsResponse"
        "404":
          description: Classroom not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/classrooms/{classroomId}/sessions/{sessionId}:
    get:
      tags:
        - ClassroomSessions
      operationId: getClassroomSessionById
      summary: Get a classroom session by id
      description: Returns a single classroom session by its identifier.
      parameters:
        - $ref: "#/components/parameters/ClassroomIdPath"
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: Classroom session found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassroomSessionResponse"
        "404":
          description: Classroom session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags:
        - ClassroomSessions
      operationId: deleteClassroomSession
      summary: Delete a classroom session
      description: Hard-deletes a classroom session and its attendances.
      parameters:
        - $ref: "#/components/parameters/ClassroomIdPath"
        - $ref: "#/components/parameters/SessionId"
      responses:
        "204":
          description: Classroom session deleted
        "404":
          description: Classroom session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/classrooms/{classroomId}/sessions/{sessionId}/attendances:
    post:
      tags:
        - ClassroomSessions
      operationId: createClassroomSessionAttendance
      summary: Create a classroom session attendance
      description: Records attendance for a classroom member in a session.
      parameters:
        - $ref: "#/components/parameters/ClassroomIdPath"
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClassroomSessionAttendanceCommand"
      responses:
        "201":
          description: Classroom session attendance created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassroomSessionAttendanceResponse"
        "400":
          description: Invalid create command
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Classroom, session, or member not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Attendance already exists for the member in this session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/classrooms/{classroomId}/sessions/{sessionId}/attendances/{attendanceId}:
    delete:
      tags:
        - ClassroomSessions
      operationId: deleteClassroomSessionAttendance
      summary: Delete a classroom session attendance
      description: Hard-deletes a classroom session attendance record.
      parameters:
        - $ref: "#/components/parameters/ClassroomIdPath"
        - $ref: "#/components/parameters/SessionId"
        - $ref: "#/components/parameters/AttendanceId"
      responses:
        "204":
          description: Classroom session attendance deleted
        "404":
          description: Classroom session attendance not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Cognito JWT access token. Admin endpoints require the ADMIN Cognito group.

  parameters:
    ClassroomId:
      name: id
      in: path
      required: true
      description: Classroom identifier
      schema:
        type: string
        format: uuid
        description: Classroom UUID
        example: 3fa85f64-5717-4562-b3fc-2c963f66afa6

    ClassroomIdPath:
      name: classroomId
      in: path
      required: true
      description: Classroom identifier
      schema:
        type: string
        format: uuid
        description: Classroom UUID
        example: 3fa85f64-5717-4562-b3fc-2c963f66afa6

    MemberId:
      name: memberId
      in: path
      required: true
      description: Classroom member identifier
      schema:
        type: string
        format: uuid
        description: Classroom member UUID
        example: 7c9e6679-7425-40de-944b-e07fc1f90ae7

    SessionId:
      name: sessionId
      in: path
      required: true
      description: Classroom session identifier
      schema:
        type: string
        format: uuid
        description: Classroom session UUID
        example: 9b1deb4d-3b7d-4bad-9bdd-2b0d7b3dcb6d

    AttendanceId:
      name: attendanceId
      in: path
      required: true
      description: Classroom session attendance identifier
      schema:
        type: string
        format: uuid
        description: Classroom session attendance UUID
        example: 1b9d6bcd-bbfd-4b2d-9b5d-ab8dfbbd4bed

  schemas:
    ClassroomFilter:
      type: object
      description: Student filter
      additionalProperties: false
      properties:
        page:
          type: integer
          default: 0
          minimum: 0
        size:
          type: integer
          default: 10
          minimum: 1
          maximum: 50
        sortBy:
          type: string
          pattern: '^(name)$'
        sortDirection:
          type: string
          enum: [ ASC, DESC ]
          default: ASC
        filters:
          type: array
          items:
            type: object
            required: [field, operator, value]
            properties:
              field:
                type: string
                pattern: '^(name)$'
              operator:
                type: string
                pattern: '^(eq|like|gt|lt|gte|lte)$'
              value:
                type: string
    ClassroomResponse:
      type: object
      description: Classroom resource returned by the API
      additionalProperties: false
      required:
        - id
        - name
        - createdDate
        - lastModifiedDate
      properties:
        id:
          type: string
          format: uuid
          description: Unique classroom identifier
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        name:
          type: string
          description: Display name of the classroom
          minLength: 1
          maxLength: 255
          example: Algebra I
        createdDate:
          type: string
          format: date-time
          description: When the classroom was created
          example: 2026-07-14T00:00:00
        lastModifiedDate:
          type: string
          format: date-time
          description: When the classroom was last modified
          example: 2026-07-14T00:00:00

    GetAllClassroomsResponse:
      type: array
      description: Collection of classrooms
      items:
        $ref: "#/components/schemas/ClassroomResponse"

    ClassroomMemberFilter:
      type: object
      description: Filter for querying classroom members
      additionalProperties: false
      properties:
        page:
          type: integer
          default: 0
          minimum: 0
        size:
          type: integer
          default: 10
          minimum: 1
          maximum: 50
        sortBy:
          type: string
          pattern: '^(accountId|role|status|createdDate)$'
        sortDirection:
          type: string
          enum: [ ASC, DESC ]
          default: ASC
        filters:
          type: array
          items:
            type: object
            required: [field, operator, value]
            properties:
              field:
                type: string
                pattern: '^(accountId|role|status)$'
              operator:
                type: string
                pattern: '^(eq|like|gt|lt|gte|lte)$'
              value:
                type: string

    GetAllClassroomMembersResponse:
      type: array
      description: Collection of classroom members
      items:
        $ref: "#/components/schemas/ClassroomMemberResponse"

    GetAllClassroomsQuery:
      type: object
      description: Query to retrieve all classrooms
      additionalProperties: false
      properties: {}

    GetClassroomByIdQuery:
      type: object
      description: Query to retrieve a classroom by id
      additionalProperties: false
      required:
        - id
      properties:
        id:
          type: string
          format: uuid
          description: Classroom identifier to look up
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6

    CreateClassroomCommand:
      type: object
      description: Command to create a classroom
      additionalProperties: false
      required:
        - name
      properties:
        name:
          type: string
          description: Display name of the classroom
          minLength: 1
          maxLength: 255
          example: Algebra I

    UpdateClassroomCommand:
      type: object
      description: Command to update a classroom
      additionalProperties: false
      required:
        - name
      properties:
        name:
          type: string
          description: Updated display name of the classroom
          minLength: 1
          maxLength: 255
          example: Algebra II

    ClassroomMemberRole:
      type: string
      description: Role of a classroom member
      enum:
        - ADMIN
        - TEACHER
        - STUDENT
      example: STUDENT

    ClassroomMemberStatus:
      type: string
      description: Membership status
      enum:
        - ACTIVE
        - REMOVED
      example: ACTIVE

    CreateClassroomMemberCommand:
      type: object
      description: Command to add a member to a classroom
      additionalProperties: false
      required:
        - accountId
        - role
      properties:
        accountId:
          type: string
          description: External account identifier for the member
          minLength: 1
          maxLength: 255
          example: acc_12345
        role:
          $ref: "#/components/schemas/ClassroomMemberRole"

    UpdateClassroomMemberRoleCommand:
      type: object
      description: Command to update a classroom member role
      additionalProperties: false
      required:
        - role
      properties:
        role:
          $ref: "#/components/schemas/ClassroomMemberRole"

    ClassroomMemberResponse:
      type: object
      description: Classroom member resource returned by the API
      additionalProperties: false
      required:
        - id
        - classroomId
        - accountId
        - role
        - status
        - email
        - name
        - createdDate
        - lastModifiedDate
      properties:
        id:
          type: string
          format: uuid
          description: Unique classroom member identifier
          example: 7c9e6679-7425-40de-944b-e07fc1f90ae7
        classroomId:
          type: string
          format: uuid
          description: Classroom this membership belongs to
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        accountId:
          type: string
          description: External account identifier for the member
          minLength: 1
          maxLength: 255
          example: acc_12345
        role:
          $ref: "#/components/schemas/ClassroomMemberRole"
        status:
          $ref: "#/components/schemas/ClassroomMemberStatus"
        email:
          type: string
          format: email
          description: Denormalized member email from the account/identity service
          minLength: 1
          maxLength: 255
          example: alex@example.com
        name:
          type: string
          description: Denormalized member display name from the account/identity service
          minLength: 1
          maxLength: 255
          example: Alex Nguyen
        createdDate:
          type: string
          format: date-time
          description: When the membership was created
          example: 2026-07-14T00:00:00
        lastModifiedDate:
          type: string
          format: date-time
          description: When the membership was last modified
          example: 2026-07-14T00:00:00

    ClassroomSessionAttendanceStatus:
      type: string
      description: Attendance status for a classroom session
      enum:
        - ATTENDED
        - ABSENT
        - UNSET
      example: UNSET

    CreateClassroomSessionCommand:
      type: object
      description: Command to create a classroom session
      additionalProperties: false
      required:
        - sessionDate
      properties:
        sessionDate:
          type: string
          format: date-time
          description: When the classroom session takes place
          example: 2026-07-19T09:00:00Z

    ClassroomSessionFilter:
      type: object
      description: Filter for querying classroom sessions
      additionalProperties: false
      properties:
        page:
          type: integer
          default: 0
          minimum: 0
        size:
          type: integer
          default: 10
          minimum: 1
          maximum: 50
        sortBy:
          type: string
          pattern: '^(sessionDate|createdDate)$'
        sortDirection:
          type: string
          enum: [ ASC, DESC ]
          default: ASC
        filters:
          type: array
          items:
            type: object
            required: [field, operator, value]
            properties:
              field:
                type: string
                pattern: '^(sessionDate)$'
              operator:
                type: string
                pattern: '^(eq|like|gt|lt|gte|lte)$'
              value:
                type: string

    ClassroomSessionResponse:
      type: object
      description: Classroom session resource returned by the API
      additionalProperties: false
      required:
        - id
        - classroomId
        - sessionDate
        - createdDate
        - lastModifiedDate
      properties:
        id:
          type: string
          format: uuid
          description: Unique classroom session identifier
          example: 9b1deb4d-3b7d-4bad-9bdd-2b0d7b3dcb6d
        classroomId:
          type: string
          format: uuid
          description: Classroom this session belongs to
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        sessionDate:
          type: string
          format: date-time
          description: When the classroom session takes place
          example: 2026-07-19T09:00:00Z
        createdDate:
          type: string
          format: date-time
          description: When the session was created
          example: 2026-07-14T00:00:00Z
        lastModifiedDate:
          type: string
          format: date-time
          description: When the session was last modified
          example: 2026-07-14T00:00:00Z

    GetAllClassroomSessionsResponse:
      type: array
      description: Collection of classroom sessions
      items:
        $ref: "#/components/schemas/ClassroomSessionResponse"

    CreateClassroomSessionAttendanceCommand:
      type: object
      description: Command to create a classroom session attendance record
      additionalProperties: false
      required:
        - classroomMemberId
        - status
      properties:
        classroomMemberId:
          type: string
          format: uuid
          description: Classroom member whose attendance is being recorded
          example: 7c9e6679-7425-40de-944b-e07fc1f90ae7
        attendanceDate:
          type: string
          format: date-time
          description: When attendance was recorded; defaults to now when omitted
          example: 2026-07-19T09:05:00Z
        status:
          $ref: "#/components/schemas/ClassroomSessionAttendanceStatus"

    ClassroomSessionAttendanceResponse:
      type: object
      description: Classroom session attendance resource returned by the API
      additionalProperties: false
      required:
        - id
        - sessionId
        - classroomMemberId
        - status
        - createdDate
        - lastModifiedDate
      properties:
        id:
          type: string
          format: uuid
          description: Unique attendance identifier
          example: 1b9d6bcd-bbfd-4b2d-9b5d-ab8dfbbd4bed
        sessionId:
          type: string
          format: uuid
          description: Session this attendance belongs to
          example: 9b1deb4d-3b7d-4bad-9bdd-2b0d7b3dcb6d
        classroomMemberId:
          type: string
          format: uuid
          description: Classroom member whose attendance was recorded
          example: 7c9e6679-7425-40de-944b-e07fc1f90ae7
        attendanceDate:
          type: string
          format: date-time
          description: When attendance was recorded
          example: 2026-07-19T09:05:00Z
        status:
          $ref: "#/components/schemas/ClassroomSessionAttendanceStatus"
        createdDate:
          type: string
          format: date-time
          description: When the attendance record was created
          example: 2026-07-14T00:00:00Z
        lastModifiedDate:
          type: string
          format: date-time
          description: When the attendance record was last modified
          example: 2026-07-14T00:00:00Z

    AccountProfileResponse:
      type: object
      description: Account profile for the authenticated user (app-owned user data)
      additionalProperties: false
      required:
        - id
        - cognitoSub
        - email
        - firstName
        - lastName
        - createdDate
        - lastModifiedDate
      properties:
        id:
          type: string
          format: uuid
          description: Internal account profile identifier
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        cognitoSub:
          type: string
          description: Cognito user id from the JWT `sub` claim
          minLength: 1
          maxLength: 255
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        email:
          type: string
          format: email
          description: User email address
          minLength: 1
          maxLength: 255
          example: jane.doe@example.com
        firstName:
          type: string
          description: Given name
          minLength: 1
          maxLength: 255
          example: Jane
        lastName:
          type: string
          description: Family name
          minLength: 1
          maxLength: 255
          example: Doe
        createdDate:
          type: string
          format: date-time
          description: When the profile was created
          example: 2026-07-14T00:00:00Z
        lastModifiedDate:
          type: string
          format: date-time
          description: When the profile was last modified
          example: 2026-07-14T00:00:00Z

    ErrorResponse:
      type: object
      description: Standard API error payload
      additionalProperties: false
      required:
        - code
        - message
        - status
        - timestamp
        - path
      properties:
        code:
          type: string
          description: Machine-readable error code
          minLength: 1
          maxLength: 64
          example: CLASSROOM_NOT_FOUND
        message:
          type: string
          description: Human-readable error message
          minLength: 1
          maxLength: 1024
          example: Classroom not found
        status:
          type: integer
          description: HTTP status code
          example: 404
        timestamp:
          type: string
          format: date-time
          description: When the error occurred
          example: 2026-07-16T00:00:00Z
        path:
          type: string
          description: Request path that caused the error
          minLength: 1
          maxLength: 2048
          example: /admin/classrooms/3fa85f64-5717-4562-b3fc-2c963f66afa6
